<style id="spaStyle">
  body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #eef1f3; color: #1d2733; }
  .topbar { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 14px;
            padding: 10px 16px; background: #0e5a3c; color: #fff; }
  .topbar h1 { font-size: 15px; margin: 0; font-weight: 600; }
  .topbar .status { font-size: 12px; opacity: .9; flex: 1; }
  .topbar button { background: #fff; color: #0e5a3c; border: 0; border-radius: 6px;
                   padding: 8px 16px; font-weight: 600; cursor: pointer; font-size: 13px; }
  .topbar button:disabled { opacity: .5; cursor: default; }
  .page { max-width: 210mm; margin: 16px auto; background: #fff; padding: 14mm 12mm;
          box-shadow: 0 2px 10px rgba(0,0,0,.12); }
  #coverPrev { display: block; width: 100%; margin: 0 0 16px; border: 1px solid #d5dbe0; }

  /* ── Rendered SPA document ── */
  #spaRoot { font-family: 'Times New Roman', Georgia, serif; font-size: 11px; line-height: 1.45; color: #000; }
  #spaRoot h1, #spaRoot h2, #spaRoot h3 { font-size: 12px; margin: 10px 0 4px; }
  #spaRoot p { margin: 4px 0; }
  #spaRoot table { border-collapse: collapse; width: 100%; margin: 6px 0; table-layout: fixed; }
  #spaRoot td, #spaRoot th { border: 1px solid #555; padding: 4px 6px; vertical-align: top;
                             word-wrap: break-word; overflow-wrap: anywhere; }
  #spaRoot tr { page-break-inside: avoid; }
  #spaRoot strong { font-weight: 700; }
  .ar-val, [dir="rtl"] { direction: rtl; text-align: right; unicode-bidi: plaintext; }

  /* ── Schedule A generated table ── */
  #scheduleA-installments .schedA-summary { display: grid; grid-template-columns: 1fr 1fr;
        gap: 2px 16px; margin: 6px 0 8px; font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; }
  table.schedA { border-collapse: collapse; width: 100%; font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; }
  table.schedA th, table.schedA td { border: 1px solid #555; padding: 4px 6px; }
  table.schedA th { background: #0e5a3c; color: #fff; font-weight: 600; }
  table.schedA td.c { text-align: center; }
  table.schedA td.r { text-align: right; }
  table.schedA tr.total td { font-weight: 800; background: #eef3f0; }
  table.schedA tr.balloon-row td { font-style: italic; background: #f6faf8; }

  /* ── Signatures (separate lines, EN left / AR right) ── */
  #spaRoot .sig-row { display: flex; justify-content: space-between; align-items: center;
                      margin: 20px 0; }
  #spaRoot .sig-en { font-weight: 700; }
  #spaRoot .sig-ar { direction: rtl; text-align: right; font-weight: 700; }
  /* Schedule A/B signatures: Seller left, Purchaser right */
  #spaRoot .sig2 { display: flex; justify-content: space-between; margin: 26px 0 6px; }
  #spaRoot .sig2-l { text-align: left; }
  #spaRoot .sig2-r { text-align: right; }
  /* ── Lists: strip the stray bullet wrappers, keep the numbered list ── */
  #spaRoot ul { list-style: none; margin: 4px 0; padding-left: 0; }
  #spaRoot ul > li { padding-left: 0; }
  #spaRoot ol { margin: 4px 0; padding-left: 24px; }
  #spaRoot li { margin: 3px 0; }
  /* ── Keep these blocks from splitting across pages ── */
  #spaRoot .avoid-block { page-break-inside: avoid; }
  /* ── Pagination rules honored by the server-side Chrome print engine ── */
  #spaRoot td, #spaRoot th { page-break-inside: avoid; }
  #spaRoot .leaf-li { page-break-inside: avoid; }
  #spaRoot h1, #spaRoot h2, #spaRoot h3, #spaRoot h4 { page-break-after: avoid; }
  /* ── Unit layout image (Schedule B) ── */
  #spaRoot .unit-layout { text-align: center; margin: 8px 0; page-break-inside: avoid; }
  #spaRoot .unit-layout img { display: block; max-width: 100%; max-height: 150mm;
                              height: auto; margin: 0 auto; border: 1px solid #555; }
    /* ── Final-page purchaser signature grid (2 cols, line above label) ── */
#spaRoot .sig-final-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 34px 30px; margin: 20px 0 20px; }
#spaRoot .sig-final-grid .sig-final-block { text-align: center; padding-top: 45px; }
#spaRoot .sig-final-grid .sig-final-line { border-top: 1px solid #000; height: 3px; }
#spaRoot .sig-final-grid .sig-final-label { font-weight: 700; margin: 2px 0 0; text-align: center; }
#spaRoot .sig2-r { display: grid; grid-template-columns: 1fr 1fr; justify-items: end; gap: 10px 24px; width: 260px; }
#spaRoot .sig2-block {
  padding-top: 10px;
  text-align: center;
}
#spaRoot .sig2-block .sig-final-line { border-top: none; box-shadow: 0 0.5px 0 0 #000; width: 110px; height: 2px; margin: 0 auto; }
#spaRoot .sig2-block .sig-final-label {
  font-size: 10px;
  margin: 2px 0 0;
}

async function loadEnum(entity, fieldCode) {
    try {
        const res = await callBX('crm.' + entity + '.userfield.list', { filter: { FIELD_NAME: fieldCode } });
        const ufs = Array.isArray(res) ? res : (res.result || []);
        if (ufs.length && ufs[0].LIST) {
            const m = {}; ufs[0].LIST.forEach(function(o) { m[o.ID] = o.VALUE; });
            ENUM_MAPS[fieldCode] = m;
        }
    } catch (e) { /* leave unresolved -> raw id */ }
}
function enumVal(fieldCode, id) {
    const m = ENUM_MAPS[fieldCode];
    return id ? ((m && m[id]) ? m[id] : id) : '';
}
// Fetch every list-field's options for an entity (contact/company/deal) at once and
// merge id->label maps into ENUM_MAPS. Robust to a dropdown living on any entity.
async function loadAllEnums(entity) {
    try {
        const res = await callBX('crm.' + entity + '.userfield.list', {});
        const ufs = Array.isArray(res) ? res : (res.result || []);
        ufs.forEach(function(uf) {
            if (uf.LIST && uf.LIST.length) {
                const m = {};
                uf.LIST.forEach(function(o) { m[o.ID] = o.VALUE; });
                ENUM_MAPS[uf.FIELD_NAME] = m;
            }
        });
    } catch (e) { /* leave unresolved -> raw id */ }
}

function purchaserSignaturesFinalHtml(d) {

                        '<div class="sig-final-line">&nbsp;</div>' +

function translitWord(w) {
    // collapse doubled consonants (English "tt","ll","mm" = one Arabic letter)
    const s = String(w).toLowerCase().replace(/([bcdfghjklmnpqrstvwxz])\1+/g, '$1');
    const n = s.length;
    const dig = { 'sh':'ش','ch':'تش','th':'ث','ph':'ف','gh':'غ','kh':'خ','ck':'ك','qu':'كو',
        'wh':'و','oo':'و','ee':'ي','ea':'ي','ou':'او','ow':'او','au':'او','aw':'او',
        'ai':'اي','ay':'اي','ei':'اي','ey':'اي','oa':'و','oy':'وي','oi':'وي' };
    let res = '', i = 0;
    while (i < n) {
        const c3 = s.substr(i, 3), c2 = s.substr(i, 2), ch = s[i], next = s[i + 1] || '';
        if (c3 === 'tch') { res += 'تش'; i += 3; continue; }
        if (dig[c2]) { res += dig[c2]; i += 2; continue; }
        const atStart = (i === 0);
        switch (ch) {
            case 'a': res += 'ا'; break;
            case 'b': res += 'ب'; break;
            case 'c': res += ('eiy'.indexOf(next) >= 0) ? 'س' : 'ك'; break;
            case 'd': res += 'د'; break;
            case 'e': if (atStart) res += 'إي'; else if (!(i === n - 1 && n > 2)) res += 'ي'; break;
            case 'f': res += 'ف'; break;
            case 'g': res += 'غ'; break;
            case 'h': res += 'ه'; break;
            case 'i': res += atStart ? 'إي' : 'ي'; break;
            case 'j': res += 'ج'; break;
            case 'k': res += 'ك'; break;
            case 'l': res += 'ل'; break;
            case 'm': res += 'م'; break;
            case 'n': res += 'ن'; break;
            case 'o': res += atStart ? 'أو' : 'و'; break;
            case 'p': res += 'ب'; break;
            case 'q': res += 'ق'; break;
            case 'r': res += 'ر'; break;
            case 's': res += 'س'; break;
            case 't': res += 'ت'; break;
            case 'u': res += atStart ? 'أو' : 'و'; break;
            case 'v': res += 'ف'; break;
            case 'w': res += 'و'; break;
            case 'x': res += 'كس'; break;
            case 'y': res += 'ي'; break;
            case 'z': res += 'ز'; break;
            default:  res += ch;   // keep apostrophes / unknown marks
        }
        i++;
    }
    return res;
}

// Transliterate a full string: words by sound, digits -> Arabic-Indic, separators preserved.
function translit(text) {
    if (text == null) return '';
    const s = String(text);
    if (!s.trim()) return '';
    const re = /(\d+)|([A-Za-z]+(?:['\u2019][A-Za-z]+)?)|([^\dA-Za-z]+)/g;
    let out = '', m, prevType = null;
    while ((m = re.exec(s)) !== null) {
        if (m[1] != null) {                       // digits
            out += arabicDigits(m[1]); prevType = 'd';
        } else if (m[2] != null) {                // word
            const w = m[2], key = w.toLowerCase().replace(/\u2019/g, "'");
            if (TRANSLIT_DICT[key] != null) out += TRANSLIT_DICT[key];
            else if (w.length === 1 && prevType === 'd') out += ' ' + (LETTER_NAMES[w.toLowerCase()] || translitWord(w));
            else out += translitWord(w);
            prevType = 'l';
        } else {                                  // separators (space, comma, hyphen…)
            out += m[3].replace(/,/g, '\u060C'); prevType = 'o';   // ASCII comma -> Arabic comma
        }
    }
    return out;
}

// Arabic for a text value.
//   table given (city/country/nationality): proper-Arabic lookup first, phonetic as fallback.
//   no table (name/address/authority/representative/nominee): phonetic transliteration.
function arText(en, table) {
    const k = String(en == null ? '' : en).trim();
    if (!k) return '';
    if (k === 'N/A') return 'N/A';
    if (table) {
        const l = arLookup(table, en);
        if (l && l !== en) return l;   // found a proper Arabic term
    }
    return translit(en);
}

function validateSPAData(d) {
    let errors = [];

    // 1. Check Deal Fields
    if (!d.deal[D_PAYMODE]) errors.push(REQUIRED_LABELS.deal_paymentMode);
    if (!d.deal[D_BANK]) errors.push(REQUIRED_LABELS.deal_bank);
    if (!d.deal[D_COMPLETION]) errors.push(REQUIRED_LABELS.deal_completion);
    if (!d.pj || Object.keys(d.pj).length === 0) errors.push(REQUIRED_LABELS.deal_paymentPlan);

    // 2. Check Product Fields
    if (!d.unitName && !getPropText(d.product, PROD_UNITNO)) errors.push(REQUIRED_LABELS.product_unitNo);
    if (!getProp(d.product, PROD_AREA)) errors.push(REQUIRED_LABELS.product_area);

    // 3. Check Buyer Fields (Company vs Individual)
    if (d.isCompany) {
        const co = d.company;
        if (!co.name) errors.push(REQUIRED_LABELS.company_name);
        if (!co.address) errors.push(REQUIRED_LABELS.company_address);
        if (!co.city) errors.push(REQUIRED_LABELS.company_city);
        if (!co.country) errors.push(REQUIRED_LABELS.company_country);
        if (!co.authority) errors.push(REQUIRED_LABELS.company_authority);
        if (!co.license) errors.push(REQUIRED_LABELS.company_license);
        if (!co.repName) errors.push(REQUIRED_LABELS.company_repName);
        if (!co.repPassport) errors.push(REQUIRED_LABELS.company_repPassport);
    } else {
        if (!d.purchasers || d.purchasers.length === 0) {
            errors.push('No Contacts linked to the Deal.');
        } else {
            d.purchasers.forEach(function(p, idx) {
                let prefix = d.purchasers.length > 1 ? 'Purchaser ' + (idx + 1) + ' - ' : 'Purchaser - ';
                
                if (p.isMinor) {
                    prefix = d.purchasers.length > 1 ? 'Purchaser ' + (idx + 1) + ' (Guardian) - ' : 'Guardian - ';
                    if (!p.guardianName) errors.push(prefix + "Guardian's Name");
                } else {
                    if (!p.name) errors.push(prefix + REQUIRED_LABELS.contact_name);
                }

                if (!p.address) errors.push(prefix + REQUIRED_LABELS.contact_address);
                if (!p.city) errors.push(prefix + REQUIRED_LABELS.contact_city);
                if (!p.country) errors.push(prefix + REQUIRED_LABELS.contact_country);
                if (!p.nationality) errors.push(prefix + REQUIRED_LABELS.contact_nationality);
                if (!p.passport) errors.push(prefix + REQUIRED_LABELS.contact_passport);
                if (!p.exp) errors.push(prefix + REQUIRED_LABELS.contact_exp);
            });
        }
    }
    return errors;
}

function callBX(method, params) {
    return new Promise(function(resolve, reject) {
        BX24.callMethod(method, params, function(res) {
            if (res.error()) reject(res.error()); else resolve(res.data());
        });
    });
}
function esc(s) {
    return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toNumber(raw) {
    if (raw == null) return 0;
    const n = parseFloat(String(raw).replace(/[^0-9.\-]/g, ''));
    return isNaN(n) ? 0 : n;
}
function amount(n) {
    return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function money(n) {

}
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function fmtDate(d) { return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear(); }
function addMonths(date, m) {
    const d = new Date(date.getTime());
    const day = d.getDate();
    d.setMonth(d.getMonth() + m);
    if (d.getDate() < day) d.setDate(0);

}
// If a value looks like a Bitrix date/datetime, normalise to dd/mm/yyyy; otherwise return as-is.
function maybeDate(v) {
    if (!v) return '';
    const s = String(v);
    let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return m[3] + '/' + m[2] + '/' + m[1];
    m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})/);
    if (m) return m[1] + '/' + m[2] + '/' + m[3];
    return s;
}
function getMulti(contact, field) {
    const v = contact[field];
    if (Array.isArray(v) && v.length) return v[0].VALUE || v[0].value || '';
    if (typeof v === 'string') return v;
    return '';
}
function getUF(obj, code) {
    if (!obj) return '';
    let v = obj[code];
    if (Array.isArray(v)) v = v[0];
    if (v && typeof v === 'object') v = (v.value !== undefined ? v.value : v.VALUE);
    return (v === undefined || v === null) ? '' : v;
}
function getProp(product, id) {
    if (!product) return '';
    const keys = ['property' + id, 'property_' + id, 'PROPERTY_' + id, String(id)];
    for (let i = 0; i < keys.length; i++) {
        let v = product[keys[i]];
        if (v === undefined || v === null) continue;
        if (Array.isArray(v)) v = v[0];
        if (v && typeof v === 'object') { if (v.valueEnum) return v.valueEnum; return (v.value !== undefined ? v.value : v.VALUE); }
        return v;
    }
    return '';
}

// Like getProp, but prefers the property's *_text value (Unit No = property_107_text).
function getPropText(product, id) {
    if (!product) return '';
    let v = product['property_' + id + '_text'];
    if (v === undefined || v === null) v = product['property' + id + '_text'];
    if (Array.isArray(v)) v = v[0];
    if (v !== undefined && v !== null && v !== '') return v;
    return getProp(product, id);
}  
  
function ordinal(n) { const s = ['th','st','nd','rd'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }

// Bitrix address fields store components joined by "|;|" with a trailing numeric
// location id (e.g. "Hello|;|513"). Strip the location id and join the real parts.
function cleanAddress(raw) {
    if (raw == null) return '';
    let s = String(raw);
    if (s.indexOf('|;|') === -1) return s.trim();
    let parts = s.split('|;|').map(function(x) { return x.trim(); });
    while (parts.length && /^\d+$/.test(parts[parts.length - 1])) parts.pop();  // drop trailing loc id(s)
    return parts.filter(Boolean).join(', ');
}  
function round2(n) { return Math.round(n * 100) / 100; }
function parseInstNo(label) {

/* ════════════════ NUMBER → WORDS ════════════════ */
function numToWordsEN(num) {
    num = Math.floor(Number(num) || 0);
    if (num === 0) return 'Zero';
    const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve',
        'Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
    const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    function below1000(n) {
        let s = '';
        if (n >= 100) { s += ones[Math.floor(n/100)] + ' Hundred'; n %= 100; if (n) s += ' '; }
        if (n >= 20) { s += tens[Math.floor(n/10)]; n %= 10; if (n) s += '-' + ones[n]; }
        else if (n > 0) { s += ones[n]; }
        return s;
    }
    const scales = [[1e9,'Billion'],[1e6,'Million'],[1e3,'Thousand']];
    let words = '';
    for (let i = 0; i < scales.length; i++) {
        const val = scales[i][0], name = scales[i][1];
        if (num >= val) { const c = Math.floor(num/val); words += (words ? ' ' : '') + below1000(c) + ' ' + name; num %= val; }
    }
    if (num > 0) words += (words ? ' ' : '') + below1000(num);
    return words;
}
// Arabic number-to-words — readable approximation; grammar (agreement/case) is simplified. Review for legal use.
function numToWordsAR(num) {
    num = Math.floor(Number(num) || 0);
    if (num === 0) return 'صفر';
    const ones = ['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة','عشرة',
        'أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
    const tens = ['','','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];
    const hundreds = ['','مئة','مئتان','ثلاثمئة','أربعمئة','خمسمئة','ستمئة','سبعمئة','ثمانمئة','تسعمئة'];
    function below1000(n) {
        const parts = [];
        if (n >= 100) { parts.push(hundreds[Math.floor(n/100)]); n %= 100; }
        if (n >= 20) { const o = n % 10; if (o) parts.push(ones[o] + ' و' + tens[Math.floor(n/10)]); else parts.push(tens[Math.floor(n/10)]); }
        else if (n > 0) { parts.push(ones[n]); }
        return parts.join(' و');
    }
    const scales = [[1e9,'مليار','ملياران','مليارات'],[1e6,'مليون','مليونان','ملايين'],[1e3,'ألف','ألفان','آلاف']];
    const parts = [];
    for (let i = 0; i < scales.length; i++) {
        const val = scales[i][0], sing = scales[i][1], dual = scales[i][2], plur = scales[i][3];
        if (num >= val) {
            const c = Math.floor(num / val); num %= val;
            if (c === 1) parts.push(sing);
            else if (c === 2) parts.push(dual);
            else if (c >= 3 && c <= 10) parts.push(below1000(c) + ' ' + plur);
            else parts.push(below1000(c) + ' ' + sing);
        }
    }
    if (num > 0) parts.push(below1000(num));
    return parts.join(' و');
}

/* ════════════════ SCHEDULE ENGINE (identical logic to Booking Form) ════════════════ */
function baseSchedule(plan, pj, booking, net) {
    if (plan !== 'custom' && pj && pj.downpaymentStartDate) {
        const dps = new Date(pj.downpaymentStartDate);
        if (!isNaN(dps.getTime())) booking = dps;   // standard plans anchor to the chosen start date
    }
      const completion = (plan === '60_40' || plan === '3_years' || plan === '5_years' )
        ? new Date(2028, 5, 30)          
        : addMonths(booking, HANDOVER_MONTHS);
    function dateFor(when) {
        if (when.type === 'booking')    return addMonths(booking, when.months);
        if (when.type === 'completion') return completion;
        if (when.type === 'handover')   return addMonths(completion, when.months);
        return booking;
    }
    if (SCHEDULES[plan]) {
        return SCHEDULES[plan].map(function(it) {
            const isCompletion = it.when.type === 'completion';
            const d = dateFor(it.when);
            return { label: it.label, pct: it.pct, amount: round2(net * it.pct / 100),
                     dateStr: fmtDate(d), ts: d.getTime(),
                     locked: (it.label === 'Downpayment' || isCompletion), instNo: parseInstNo(it.label) };
        });
    }
    if (plan === 'full_payment') {
        const d = pj.paymentDate ? new Date(pj.paymentDate) : booking;
        const ok = !isNaN(d.getTime());
        return [{ label: 'Full Payment', pct: 100, amount: net,
                  dateStr: ok ? fmtDate(d) : fmtDate(booking), ts: ok ? d.getTime() : booking.getTime(),
                  locked: true, instNo: null }];
    }
    if (plan === 'custom') return buildCustomSchedule(pj, net);
    return [];
}
function buildCustomSchedule(pj, net) {
    const freqMap = { monthly: 1, quarterly: 3, biannually: 6, annually: 12 };
    const pctOf = function(amt) { return net > 0 ? round2(amt / net * 100) : 0; };

    const dp  = toNumber(pj.downpaymentPct);
    const dc  = toNumber(pj.duringConstructionPct);
    const pos = toNumber(pj.possessionPct);

    const dpDate  = pj.downpaymentDate ? new Date(pj.downpaymentDate) : new Date();
    const posDate = pj.possessionDate ? new Date(pj.possessionDate) : null;
    const dcStart = pj.duringConstructionStartDate ? new Date(pj.duringConstructionStartDate) : dpDate;
    const phStart = pj.postHandoverStartDate ? new Date(pj.postHandoverStartDate) : (posDate || dpDate);
    const dcN = Math.max(0, parseInt(pj.duringConstructionPayments, 10) || 0);
    const phN = Math.max(0, parseInt(pj.postHandoverPayments, 10) || 0);
    const dcF = freqMap[pj.duringConstructionFreq] || 1;
    const phF = freqMap[pj.postHandoverFreq] || 1;

    const dpAmt  = round2(net * dp / 100);
    const dcTot  = round2(net * dc / 100);
    const posAmt = round2(net * pos / 100);
    const phTot  = round2(net - dpAmt - dcTot - posAmt);   // remainder closes the plan to 100%

    function split(total, count) {
        const arr = []; let acc = 0; const each = count > 0 ? round2(total / count) : 0;
        for (let i = 0; i < count; i++) {
            const amt = (i === count - 1) ? round2(total - acc) : each;
            arr.push(amt); acc = round2(acc + amt);
        }
        return arr;
    }

    const rows = [];
    let instNo = 0;

    // 1) Downpayment (locked, unnumbered)
    rows.push({ label: 'Downpayment', pct: round2(dp), amount: dpAmt,
                dateStr: fmtDate(dpDate), ts: dpDate.getTime(), locked: true, instNo: null });

    // 2) During Construction installments (continuous numbering)
    const dcAmts = split(dcTot, dcN);
    for (let i = 0; i < dcN; i++) {
        instNo++;
        const d = addMonths(dcStart, i * dcF);
        rows.push({ label: ordinal(instNo) + ' Installment', pct: pctOf(dcAmts[i]),
                    amount: dcAmts[i], dateStr: fmtDate(d), ts: d.getTime(),
                    locked: false, instNo: instNo });
    }

    // 3) On Possession (locked, unnumbered) — between the two installment phases
    rows.push({ label: 'On Possession', pct: round2(pos), amount: posAmt,
                dateStr: posDate ? fmtDate(posDate) : '\u2014',
                ts: posDate ? posDate.getTime() : null, locked: true, instNo: null });

    // 4) Post Handover installments (numbering continues)
    const phAmts = split(phTot, phN);
    for (let j = 0; j < phN; j++) {
        instNo++;
        const d2 = addMonths(phStart, j * phF);
        rows.push({ label: ordinal(instNo) + ' Installment', pct: pctOf(phAmts[j]),
                    amount: phAmts[j], dateStr: fmtDate(d2), ts: d2.getTime(),
                    locked: false, instNo: instNo });
    }

    return rows;
}
function buildSchedule(plan, pj, booking, net) {
    const rows = applyBalloons(baseSchedule(plan, pj, booking, net), pj);
    if (plan === 'custom') return rows;   // custom keeps its fixed phase order (dates already ordered)
    return rows.map(function(r, i) { r._i = i; return r; })
        .sort(function(a, b) {
            const ta = (a.ts == null ? Number.MAX_SAFE_INTEGER : a.ts);
            const tb = (b.ts == null ? Number.MAX_SAFE_INTEGER : b.ts);
            return (ta - tb) || (a._i - b._i);
        });
}
function applyBalloons(rows, pj) {
    const balloons = (Array.isArray(pj.balloonPayments) ? pj.balloonPayments : [])
        .map(function(b) { return { position: parseInt(b.position, 10), amount: toNumber(b.amount) }; })
        .filter(function(b) { return b.amount > 0; });
    if (!balloons.length) return rows;
    const poolBase = rows.reduce(function(a, r) { return a + (r.locked ? 0 : r.amount); }, 0);
    const balloonTotal = balloons.reduce(function(a, b) { return a + b.amount; }, 0);
    if (poolBase > 0) {
        const scale = Math.max(0, poolBase - balloonTotal) / poolBase;
        rows.forEach(function(r) { if (!r.locked) r.amount = round2(r.amount * scale); });
    }
    function brow(b, dateStr, ts) {
        return { label: 'Balloon Payment', pct: '', amount: round2(b.amount),
                 dateStr: dateStr, ts: ts, locked: true, instNo: null, balloon: true };
    }
    const matched = {};
    rows.forEach(function(r) { if (r.instNo != null) matched[r.instNo] = true; });
    const out = [];
    let lastInstDate = '', lastInstTs = null;
    rows.forEach(function(r) {
        out.push(r);
        if (r.instNo != null) {
            lastInstDate = r.dateStr; lastInstTs = r.ts;
            balloons.filter(function(b) { return b.position === r.instNo; })
                    .forEach(function(b) { out.push(brow(b, r.dateStr, (r.ts || 0) + 1)); });
        }
    });
    balloons.filter(function(b) { return !matched[b.position]; })
            .forEach(function(b) {
                let idx = -1;
                out.forEach(function(r, i) { if (r.instNo != null) idx = i; });
                out.splice(idx >= 0 ? idx + 1 : out.length, 0, brow(b, lastInstDate, (lastInstTs || 0) + 1));
            });
    return out;
}

    try { pj = JSON.parse(deal[JSON_FIELD] || '{}'); } catch (e) { pj = {}; }
    const plan = pj.paymentPlan || '';

    const contacts = await loadContacts();

    // Company (when the purchaser is a company rather than individuals)
    let company = null;
    const companyId = deal.COMPANY_ID;
    if (companyId && parseInt(companyId, 10) > 0) {
        try {
            const coRes = await callBX('crm.company.get', { id: companyId });
            company = coRes.result ? coRes.result : coRes;
        } catch (e) { console.warn('[SPA] company load failed:', e); }
    }

    let product = null, unitName = '', unitImage = '';
    try {
        const rowsData = await callBX('crm.deal.productrows.get', { id: currentDealId });
        const rows = Array.isArray(rowsData) ? rowsData : (rowsData.result || []);
        if (rows.length) {
            unitName = rows[0].PRODUCT_NAME || '';
            const pid = rows[0].PRODUCT_ID;
            if (pid) {
                const pd = await callBX('catalog.product.get', { id: pid });
                product = (pd && pd.product) ? pd.product : pd;
                unitImage = await loadUnitImage(pid, product);
            }
        }
    } catch (e) { console.warn('[SPA] product load failed (check catalog scope):', e); }

    // Payment-mode enum (deal field) — option id -> label
    try {
        const pmRes = await callBX('crm.deal.userfield.list', { filter: { FIELD_NAME: D_PAYMODE } });
        const pmUfs = Array.isArray(pmRes) ? pmRes : (pmRes.result || []);
        if (pmUfs.length && pmUfs[0].LIST) {
            PAYMODE_MAP = {};
            pmUfs[0].LIST.forEach(function(o) { PAYMODE_MAP[o.ID] = o.VALUE; });
        }
    } catch (e) { /* fall back to raw id */ }

    // Dropdown enum maps. Load every list field for contact/company/deal so each
    // dropdown (incl. Nominee Nationality, wherever it lives) resolves to its label.
    await Promise.all([
        loadAllEnums('contact'),
        loadAllEnums('company'),
        loadAllEnums('deal')
    ]);

    SPA_DATA = buildContext(deal, contacts, company, product, unitName, pj, plan, unitImage);
    
    // --- NEW VALIDATION GATEKEEPER ---
    const validationErrors = validateSPAData(SPA_DATA);
    if (validationErrors.length > 0) {
        showErrors(validationErrors);
        return; 
    }
    // ---------------------------------

    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('spaRoot').style.display = 'block';
    document.getElementById('coverPrev').style.display = 'block';

    const attachBtn = document.getElementById('attachBtn');
    attachBtn.onclick = attachToDeal;
    attachBtn.textContent = 'Attach to Deal';

    await renderSpa(SPA_DATA);
    attachBtn.disabled = false;
    setStatus('Ready — review, then Attach to Deal.');
    notifyResize();
}

function schedulePurchaserSignaturesHtml(d) {

async function loadContacts() {
    let items = [];
    try {
        const r = await callBX('crm.deal.contact.items.get', { id: currentDealId });
        items = Array.isArray(r) ? r : (r.result || []);
    } catch (e) { console.warn('[SPA] contact items:', e); }
    let typeMap = {};
    try {
        const ufRes = await callBX('crm.contact.userfield.list', { filter: { FIELD_NAME: C_TYPE } });
        const ufs = Array.isArray(ufRes) ? ufRes : (ufRes.result || []);
        if (ufs.length && ufs[0].LIST) ufs[0].LIST.forEach(function(o) { typeMap[o.ID] = o.VALUE; });
    } catch (e) { /* fall back to order */ }
    const loaded = [];
    for (let i = 0; i < items.length; i++) {
        const cid = items[i].CONTACT_ID || items[i].contactId;
        if (!cid) continue;
        try {
            const cRes = await callBX('crm.contact.get', { id: cid });
            const c = cRes.result ? cRes.result : cRes;
            const typeLabel = (typeMap[getUF(c, C_TYPE)] || '');
            const m = typeLabel.match(/(\d+)/);
            c.__order = m ? parseInt(m[1], 10) : (i + 1);
            loaded.push(c);
        } catch (e) { console.warn('[SPA] contact', cid, e); }
    }
    loaded.sort(function(a, b) { return a.__order - b.__order; });
    return loaded;
}

// Resolve a UF code from the contact first, then the deal.
function field(contact, deal, code) {
    const v = getUF(contact, code);
    if (v !== '' && v != null) return v;
    return getUF(deal, code);
}
// Empty -> "N/A" (used for nominee fields so blank blocks read clearly)
function naIfEmpty(v) {
    return (v == null || String(v).trim() === '') ? 'N/A' : v;
}
function contactToPurchaser(c) {
    if (!c) return null;
    const name = [c.NAME, c.SECOND_NAME, c.LAST_NAME].filter(Boolean).join(' ').trim();
    return {
        name:        name,
        nameAr:     getUF(c, C_NAME_AR),
        buyerShare:  getUF(c, C_BUYER_SHARE), 
        isMinor:     String(getUF(c, C_TYPE)) === C_TYPE_MINOR,
        guardianName: getUF(c, C_GUARDIAN_NAME),
        address:     cleanAddress(getUF(c, C_ADDRESS)),
        addressAr:   cleanAddress(getUF(c, C_ADDRESS_AR)),
        pobox:       getUF(c, C_POBOX),
        uaeResident: UAE_RESIDENT_MAP[getUF(c, C_UAE_RESIDENT)] || '',
        city:        getUF(c, C_CITY),
        phone:       getMulti(c, 'PHONE'),
        email:       getMulti(c, 'EMAIL'),
        country:     enumVal(C_COUNTRY, getUF(c, C_COUNTRY)),
        nationality: enumVal(C_NATIONALITY, getUF(c, C_NATIONALITY)),
        passport:    getUF(c, C_PASSPORT),
        exp:         maybeDate(getUF(c, C_EXP))
    };
}
function companyToObj(co) {
    if (!co) return null;
    return {
        name:           co.TITLE || '',
        address:        cleanAddress(getUF(co, CO_ADDRESS)),
        city:           getUF(co, CO_CITY),
        country:        enumVal(CO_COUNTRY, getUF(co, CO_COUNTRY)),
        mobile:         getMulti(co, 'PHONE'),
        email:          getMulti(co, 'EMAIL'),
        authority:      getUF(co, CO_AUTHORITY),
        license:        getUF(co, CO_LICENSE),
        licenseExp:     maybeDate(getUF(co, CO_LICENSE_EXP)),
        representor:    getUF(co, CO_REP),
        repName:        getUF(co, CO_REP_NAME),
        repPassport:    getUF(co, CO_REP_PASSPORT),
        repPassportExp: maybeDate(getUF(co, CO_REP_PASS_EXP)),
        uaeIncorpId:    String(getUF(co, CO_UAE_INCORP) || ''),
        uaeIncorp:      UAE_INCORP_MAP[getUF(co, CO_UAE_INCORP)] || '',
        zone:           ZONE_MAP[getUF(co, CO_ZONE)] || ''
    };
}
function buildContext(deal, contacts, company, product, unitName, pj, plan, unitImage) {
    const today = new Date();
    const discPct = toNumber(pj.discountPct);
    const net = toNumber(deal.OPPORTUNITY);
    const purchasePrice = (discPct > 0 && discPct < 100) ? round2(net / (1 - discPct / 100)) : net;
    const discValue = round2(purchasePrice - net);
    const dldFee = round2(purchasePrice * DLD_RATE);
    const schedule = buildSchedule(plan, pj, today, net);
    let downpaymentAmt = 0;
    for (let i = 0; i < schedule.length; i++) {
        if (schedule[i].label === 'Downpayment') { downpaymentAmt = schedule[i].amount; break; }
    }
    if (!downpaymentAmt && schedule.length) downpaymentAmt = schedule[0].amount;

    const buyer = (contacts && contacts[0]) || null;          // primary contact (nominee + single-value fields)
    const purchasers = (contacts || []).map(contactToPurchaser).filter(Boolean);
    const companyObj = companyToObj(company);
    const isCompany = !!companyObj;

    // Contract body shows EVERY purchaser (joined). Company purchase -> company name/address.
    const buyerName = isCompany ? companyObj.name
        : purchasers.map(function(p) { return p.name; }).filter(Boolean).join(' & ');
    const bodyAddress = isCompany ? companyObj.address
        : purchasers.map(function(p) { return p.address; }).filter(Boolean).join(' & ');

    return {
        today: today, deal: deal, buyer: buyer, purchasers: purchasers,
        company: companyObj, isCompany: isCompany,
        product: product, pj: pj, plan: plan,
        net: net, purchasePrice: purchasePrice, discPct: discPct, discValue: discValue,
        dldFee: dldFee, adminFee: ADMIN_FEE, schedule: schedule,
        furnished: (pj.furnished === 'Yes' || pj.furnished === true) ? 'Yes' : 'No',
        privatePool: (pj.privatePool === 'Yes' || pj.privatePool === true) ? 'Yes' : 'No',
        downpaymentAmt: downpaymentAmt, buyerName: buyerName, bodyAddress: bodyAddress,
        unitName: unitName,
        unitImage: unitImage || '',
        spsl: 'SPSL-' + String(currentDealId).padStart(4, '0')
    };
}

/* ════════════════ FIELD/IMAGE HELPERS ════════════════ */
// Convert ASCII digits to Arabic-Indic (for the Arabic date cell)
function arabicDigits(s) {
    const map = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
    return String(s == null ? '' : s).replace(/[0-9]/g, function(d) { return map[+d]; });
}
// Area is stored in SqFt; SPA shows SqM
function sqftToSqm(v) {
    const n = parseFloat(String(v).replace(/[^0-9.]/g, ''));
    if (!isFinite(n) || !n) return '';
    return round2(n * SQFT_TO_SQM) + ' Sq.m';
}
// Resolve the payment-mode enum id -> label
function resolvePayMode(id) { return id ? (PAYMODE_MAP[id] || id) : ''; }

// ── Unit image (same approach as the Booking Form) ──
function pictureUrl(v) {
    if (!v) return '';
    if (Array.isArray(v)) v = v[0];
    if (v && typeof v === 'object') {
        return v.downloadUrl || v.DOWNLOAD_URL || v.detailUrl || v.DETAIL_URL ||
               v.showUrl || v.SHOW_URL || v.src || v.SRC || v.url || v.URL || '';
    }
    if (typeof v === 'string' && v.indexOf('http') === 0) return v;
    return '';
}
function absolutize(url) {
    if (!url || url.indexOf('http') === 0) return url || '';
    let dom = (BX24.getDomain && BX24.getDomain()) || location.host;
    dom = dom.replace(/^https?:\/\//, '');
    return 'https://' + dom + (url.charAt(0) === '/' ? '' : '/') + url;
}
async function toDataURL(url) {
    try {
        const resp = await fetch(url, { mode: 'cors' });
        const blob = await resp.blob();
        return await new Promise(function(res, rej) {
            const fr = new FileReader();
            fr.onload = function() { res(fr.result); };
            fr.onerror = rej;
            fr.readAsDataURL(blob);
        });
    } catch (e) { console.warn('[SPA] image inline failed, using direct URL:', e); return url; }
}
async function loadUnitImage(pid, product) {
    let url = '';
    try {
        const imgData = await callBX('catalog.productImage.list', { productId: pid });
        let imgs = (imgData && imgData.productImages) ? imgData.productImages
                 : (imgData && imgData.result && imgData.result.productImages) ? imgData.result.productImages
                 : (Array.isArray(imgData) ? imgData : (imgData && imgData.result) || []);
        if (Array.isArray(imgs) && imgs.length) {
            const order = ['DETAIL_PICTURE', 'PREVIEW_PICTURE', 'MORE_PHOTO'];
            let chosen = null;
            for (let i = 0; i < order.length && !chosen; i++) {
                chosen = imgs.find(function(x) { return x.type === order[i]; });
            }
            if (!chosen) chosen = imgs[0];
            url = chosen ? (chosen.detailUrl || chosen.downloadUrl || chosen.DETAIL_URL || chosen.DOWNLOAD_URL || '') : '';
        }
    } catch (e) { console.warn('[SPA] productImage.list failed:', e); }
    if (!url) {
        try {
            const pr = await callBX('crm.product.get', { id: pid });
            const prod = pr && pr.result ? pr.result : pr;
            url = pictureUrl(prod && prod.DETAIL_PICTURE) || pictureUrl(prod && prod.PREVIEW_PICTURE);
        } catch (e) { console.warn('[SPA] crm.product.get failed:', e); }
    }
    if (!url && product) {
        url = pictureUrl(product.detailPicture) || pictureUrl(product.previewPicture) ||
              pictureUrl(product.DETAIL_PICTURE) || pictureUrl(product.PREVIEW_PICTURE);
    }
    if (!url) { console.warn('[SPA] no unit image URL found for product', pid); return ''; }
    url = absolutize(url);
    const fetchUrl = IMAGE_PROXY ? (IMAGE_PROXY + encodeURIComponent(url)) : url;
    const inlined = await toDataURL(fetchUrl);
    if (inlined && inlined.indexOf('data:') === 0) return inlined;
    return url;
}

/* ════════════════ PLACEHOLDER MAP ════════════════ */
const I_CITY = 'UfCrm151776677095087', I_COUNTRY = 'UfCrm151776677134809',
      I_NAT = 'UfCrm151776676964285', I_NOM_NAT = 'UfCrm151778950670679',
      I_PAYMODE = 'UfCrm151778950818534', I_PRICE_WORDS = 'UfCrm151778950758041',
      I_NOM_NAME = 'UfCrm151778950656579';

function buildEnMap(d) {
    const deal = d.deal, c = d.buyer;
    const m = {};
    m['{DocumentCreateTime}']          = fmtDate(d.today);
    m['{DocumentCreateTimeAR}']        = arabicDigits(fmtDate(d.today));         // Arabic date cell
    m['{UfCrm151776676644246}']        = d.buyerName;                          // Buyer Name
    m['{UfCrm151776677178207}']        = d.bodyAddress;                        // Address (all purchasers / company)
    m['{UfCrm151776677041562}']        = field(c, deal, C_POBOX);             // P.O. Box
    m['{UfCrm151776408293897}']        = '';                                   // Emirate (removed)
    m['{UfCrm151776677095087}']        = field(c, deal, C_CITY);              // City
    m['{UfCrm151776677210899}']        = getMulti(c || {}, 'PHONE');          // Phone/Mobile (standard mobile)
    m['{UfCrm151776679367829}']        = getMulti(c || {}, 'EMAIL');          // Email
    m['{UfCrm151776677134809}']        = enumVal(C_COUNTRY, field(c, deal, C_COUNTRY));         // Country
    m['{UfCrm151776676964285}']        = enumVal(C_NATIONALITY, field(c, deal, C_NATIONALITY)); // Nationality
    m['{UfCrm151776677008771}']        = field(c, deal, C_PASSPORT);          // Passport No
    m['{UfCrm151778950639813}']        = maybeDate(field(c, deal, C_EXP));     // Exp Date
    m['{UfCrm151778950656579}']        = naIfEmpty(field(c, deal, C_NOM_NAME));          // Nominee Name
    m['{UfCrm151778950670679}']        = naIfEmpty(enumVal(C_NOM_NAT, field(c, deal, C_NOM_NAT))); // Nominee Nationality
    m['{UfCrm151778950686842}']        = naIfEmpty(field(c, deal, C_NOM_PASS));          // Nominee Passport
    m['{UfCrm151778950699925}']        = naIfEmpty(maybeDate(field(c, deal, C_NOM_EXP))); // Nominee Exp
    m['{ProductsProductTitle}']        = getPropText(d.product, PROD_UNITNO) || d.unitName;  // Unit No (property 107)
    m['{UfCrm151778950723706}']        = field(c, deal, D_PARKING);           // Parking
    m['{ProductsProductProperty113}']  = sqftToSqm(getProp(d.product, PROD_AREA)); // Area in SqM
    m['{ProductsProductProperty177}']  = getProp(d.product, PROD_TYPE);        // Unit Type (property 177)
    m['{ProductsProductFloor}']        = getProp(d.product, PROD_FLOOR);        // Floor (Schedule B)
    m['{UfCrm151778950758041}']        = (numToWordsEN(d.net) + ' UAE Dirhams Only').trim();  // Total in words
    m['{UfCrm151778950818534}']        = resolvePayMode(field(c, deal, D_PAYMODE)); // Payment Mode (label)
    m['{DOWNPAYMENT_AMOUNT}']          = money(d.downpaymentAmt);             // actual down payment
    m['{UfCrm151778937940306}']        = amount(d.net);                       // Total Purchase Price (amount only; cell header is "Total: (AED)")
    m['{UfCrm151778950836438}']        = field(c, deal, D_BANK);              // Bank
    m['{UfCrm151778951218364}']        = maybeDate(field(c, deal, D_COMPLETION)); // Anticipated Completion
    m['{UfCrm151778953417705}']        = field(c, deal, D_WITNESS);           // Witness Name
    return m;
}
function arValueFor(inner, enMap, d) {
    const en = enMap['{' + inner + '}'];
    switch (inner) {
        case I_CITY:        return arText(en, CITY_AR);
        case I_COUNTRY:     return arText(en, COUNTRY_AR);
        case I_NAT:
        case I_NOM_NAT:     return arText(en, NAT_AR);
        case I_NOM_NAME:    return arText(en);
        case I_PAYMODE:     return arLookup(PAYMODE_AR, en);
        case I_PRICE_WORDS: return numToWordsAR(d.net) + ' درهم إماراتي فقط لا غير';
        default:            return arabicDigits(en);   // numbers/dates -> Arabic numerals; text unchanged
    }
}

/* ════════════════ RENDER ════════════════ */
async function renderSpa(d) {
    setStatus('Building document…');
    let skeleton;
    try {
        const r = await fetch('spa-skeleton.html', { cache: 'no-store' });
        skeleton = await r.text();
    } catch (e) {
        setStatus('Could not load the SPA template skeleton.', true);
        throw e;
    }
    const enMap = buildEnMap(d);

    // 1) Arabic markers  {AR::inner}
    let out = skeleton.replace(/\{AR::([A-Za-z0-9_]+)\}/g, function(_, inner) {
        return esc(arValueFor(inner, enMap, d));
    });
    // 2) English/data placeholders
    Object.keys(enMap).forEach(function(token) {
        out = out.split(token).join(esc(enMap[token]));
    });
    // 2b) Dynamic buyer rows (per purchaser, or company) — injected after token replacement
    out = out.split('{{BUYER_ROWS}}').join(buyerRowsHtml(d));

    out = out.split('{{PURCHASER_SIGNATURES_FINAL}}').join(purchaserSignaturesFinalHtml(d));

    out = out.split('{{PURCHASER_SIGNATURES_SCHEDULE}}').join(schedulePurchaserSignaturesHtml(d));

    // 2c) Unit layout image in Schedule B (falls back to the original caption)
    const layoutHtml = d.unitImage
        ? '<div class="unit-layout"><img src="' + d.unitImage + '" alt="Unit Layout"></div>'
        : '<p><strong>Floor plan to paste</strong></p>';
    out = out.split('{{UNIT_LAYOUT}}').join(layoutHtml);

    const root = document.getElementById('spaRoot');
    root.innerHTML = out;

    // 3) Schedule A installment table
    const slot = document.getElementById('scheduleA-installments');
    if (slot) slot.innerHTML = scheduleAHtml(d);

    // 3b) Tag only LEAF list items (clauses with no nested list). The skeleton wraps
    // each whole section in an outer <ul><li><ol>…</ol></li></ul>; avoiding that outer
    // <li> would try to keep an entire section on one page and dump a huge blank space
    // after the heading. We keep only the innermost clauses unbreakable.
    root.querySelectorAll('li').forEach(function(li) {
        if (!li.querySelector('ol, ul')) li.classList.add('leaf-li');
    });

    // 4) Right-align any Arabic text
    const arRe = /[\u0600-\u06FF]/;
    root.querySelectorAll('td, th, p, li, h1, h2, h3, span').forEach(function(el) {
        if (arRe.test(el.textContent || '')) { el.style.direction = 'rtl'; el.style.textAlign = 'right'; }
    });

    // 5) Centre the schedule headings and their bold subtitles; start each schedule on a new page
    root.querySelectorAll('p, h2, h3').forEach(function(el) {
        const t = (el.textContent || '').trim();
        if (/^SCHEDULE [A-F]\b/i.test(t) ||
            t === 'SCHEDULE OF PAYMENT & UNIT PRICE' ||
            t === 'Unit Plan' ||
            /^DECLARATION OF ADHERENCE/i.test(t) ||
            /^Declaration of Acceptance/i.test(t) ||
            /^THE DECLARATION OF/i.test(t)) {
            el.style.textAlign = 'center';
        }
        if (/^SCHEDULE [A-F]\s*$/i.test(t)) {
            // Start each schedule on a fresh page. Use ONE mechanism only — a CSS
            // page-break-before. (Combining it with an inserted break element caused
            // a double break, i.e. a blank page before the heading.)
            el.style.pageBreakBefore = 'always';
            el.style.breakBefore = 'page';
        }
    });
}

/* Build the APPLICANT DETAILS buyer rows: one bilingual block per purchaser
   (UAE Resident replaces Emirate), or the company block. Nominee rows are
   kept separately in the skeleton and are NOT touched here. */
function buyerRowsHtml(d) {
    function row(enL, enV, arV, arL, bold) {
        const o = bold ? '<strong>' : '', z = bold ? '</strong>' : '';
        return '<tr>' +
            '<td><p>' + o + esc(enL) + z + '</p></td>' +
            '<td><p>' + esc(enV) + '</p></td>' +
            '<td><p class="ar-val" dir="rtl">' + esc(arV) + '</p></td>' +
            '<td><p>' + o + arL + z + '</p></td></tr>';
    }
    if (d.isCompany && d.company) {
        const co = d.company;
        let r = row('Purchaser Type', 'Company', 'شركة', 'نوع المشتري', true) +
            row('Company Name', co.name, arText(co.name), 'اسم الشركة', true) +
            row('Address', co.address, arText(co.address), 'العنوان') +
            row('City', co.city, arText(co.city, CITY_AR), 'مدينة') +
            row('Country', co.country, arText(co.country, COUNTRY_AR), 'البلد') +
            row('Phone/Mobile', co.mobile, arabicDigits(co.mobile), 'الهاتف') +
            row('Email', co.email, co.email, 'الايميل') +
            row('Dubai Incorporated', co.uaeIncorp,
                (co.uaeIncorp === 'Yes' ? 'نعم' : (co.uaeIncorp === 'No' ? 'لا' : '')), 'مؤسسة في دبي') +
            // Authority, Representor and Trade License now always show (no Yes/No gating)
            row('Issuing Authority', co.authority, arText(co.authority), 'جهة الإصدار') +
            row('Representor', '', '', 'الممثل', true) +
            row('Representor\u2019s Name', co.repName, arText(co.repName), 'اسم الممثل') +
            row('Representor Passport No.', co.repPassport, arabicDigits(co.repPassport), 'رقم جواز سفر الممثل') +
            row('Representor Passport Exp.', co.repPassportExp, arabicDigits(co.repPassportExp), 'تاريخ انتهاء جواز سفر الممثل') +
            row('Trade License No.', co.license, arabicDigits(co.license), 'رقم الرخصة التجارية') +
            row('License Exp. Date', co.licenseExp, arabicDigits(co.licenseExp), 'تاريخ انتهاء الرخصة');
        return r;
    }
    const ps = (d.purchasers && d.purchasers.length) ? d.purchasers : [{
        name: '', address: '', pobox: '', uaeResident: '', city: '', phone: '',
        email: '', country: '', nationality: '', passport: '', exp: ''
    }];
    const multi = ps.length > 1;
    let h = '';
    ps.forEach(function(p, idx) {
        const n = idx + 1;
        if (p.isMinor) {
            // Minor purchaser: show "(Minor)", keep the minor's name, add Guardian's Name,
            // then the remaining fields relabelled as the Guardian's (English + Arabic).
            h += row(multi ? ('Purchaser ' + n + ' (Minor)') : 'Purchaser (Minor)', '', '',
                     multi ? ('المشتري ' + n + ' (قاصر)') : 'المشتري (قاصر)', true);
            h += row('Buyer Name', p.name, arText(p.name), 'اسم المشتري', true);
            h += row('Guardian\u2019s Name', p.guardianName, arText(p.guardianName), 'اسم ولي الأمر', true);
            h += row('Guardian\u2019s Address', p.address, arText(p.address), 'عنوان ولي الأمر');
            h += row('Guardian\u2019s P.O. Box', p.pobox, arabicDigits(p.pobox), 'صندوق بريد ولي الأمر');
            h += row('Guardian\u2019s City', p.city, arText(p.city, CITY_AR), 'مدينة ولي الأمر');
            h += row('Guardian\u2019s Phone/Mobile', p.phone, arabicDigits(p.phone), 'هاتف ولي الأمر');
            h += row('Guardian\u2019s Email', p.email, p.email, 'البريد الإلكتروني لولي الأمر');
            h += row('Guardian\u2019s Country', p.country, arText(p.country, COUNTRY_AR), 'بلد ولي الأمر');
            h += row('Guardian\u2019s Nationality', p.nationality, arText(p.nationality, NAT_AR), 'جنسية ولي الأمر');
            h += row('Guardian\u2019s Passport No.', p.passport, arabicDigits(p.passport), 'رقم جواز سفر ولي الأمر');
            h += row('Guardian\u2019s Exp. Date', p.exp, arabicDigits(p.exp), 'تاريخ انتهاء جواز سفر ولي الأمر');
            return;
        }
        if (multi) h += row('Purchaser ' + n, '', '', 'المشتري ' + n, true);
        h += row('Buyer Name', p.name, (p.nameAr), 'اسم المشتري', true);
        h += row('Ownership %', (p.buyerShare ? p.buyerShare + '%' : ''), arabicDigits(p.buyerShare) + (p.buyerShare ? '٪' : ''), 'حصة المشتري');
        h += row('Address', p.address, (p.addressAr), 'العنوان');
        h += row('P.O. Box', p.pobox, arabicDigits(p.pobox), 'رقم صندوق البريد');
        h += row('City', p.city, arText(p.city, CITY_AR), 'مدينة');
        h += row('Phone/Mobile', p.phone, arabicDigits(p.phone), 'الهاتف');
        h += row('Email', p.email, p.email, 'الايميل');
        h += row('Country', p.country, arText(p.country, COUNTRY_AR), 'البلد');
        h += row('Nationality', p.nationality, arText(p.nationality, NAT_AR), 'الجنسية');
        h += row('Passport No.', p.passport, arabicDigits(p.passport), 'رقم جواز السفر');
        h += row('Exp. Date', p.exp, arabicDigits(p.exp), 'تاريخ الانتهاء');
    });
    return h;
}

function scheduleAHtml(d) {
    let rows = '';
    if (!d.schedule.length) {
        rows = '<tr><td colspan="4">Installment schedule for this plan is not configured.</td></tr>';
    } else {
        d.schedule.forEach(function(r) {
            const pctCell = (r.pct === '' || r.pct == null) ? '' : (r.pct + '%');
            const cls = r.balloon ? ' class="balloon-row"' : '';
            rows += '<tr' + cls + '>' +
                '<td>' + esc(r.label) + '</td>' +
                '<td class="c">' + esc(r.dateStr) + '</td>' +
                '<td class="c">' + pctCell + '</td>' +
                '<td class="r">' + money(r.amount) + '</td></tr>';
        });
        rows += '<tr class="total"><td>TOTAL</td><td></td><td class="c">100%</td><td class="r">' + money(d.net) + '</td></tr>';
    }
    return '' +
        '<div class="schedA-summary">' +
            '<div><b>Net Payable:</b> ' + money(d.net) + '</div>' +
            '<div><b>Furnished:</b> ' + (d.furnished === 'Yes' ? 'Yes (' + money(FURNISHED_FEE) + ')' : 'No') + '</div>' +
            '<div><b>Private Pool:</b> ' + (d.privatePool === 'Yes' ? 'Yes (' + money(PRIVATE_POOL_FEE) + ')' : 'No') + '</div>' +
        '</div>' +
        '<table class="schedA"><thead><tr>' +
            '<th>Installments</th><th>Payment Date</th><th>Payment %</th><th>Installment Amount (AED)</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>';
}

/* ════════════════ ATTACH ════════════════ */
// Build a self-contained HTML document (the SPA CSS + the rendered body, with the
// unit image already inlined as a data-URI) and send it to the server, which renders
// the PDF with headless Chrome (clean pagination, header/footer, cover page).
async function attachToDeal() {
    const btn = document.getElementById('attachBtn');
    btn.disabled = true; btn.textContent = 'Generating PDF…';
    setStatus('Generating PDF on the server (this can take a moment for a long document)…');
    try {
        const spsl = (SPA_DATA && SPA_DATA.spsl) ? SPA_DATA.spsl : ('SPSL-' + String(currentDealId).padStart(4, '0'));
        const css = document.getElementById('spaStyle').textContent;
        const body = document.getElementById('spaRoot').outerHTML;
        // White background + no body padding for print; the SPA CSS is reused as-is.
        const html = '<!DOCTYPE html><html><head><meta charset="utf-8">' +
                     '<style>' + css + '</style>' +
                     '<style>body{margin:0;padding:0;background:#fff;}</style>' +
                     '</head><body>' + body + '</body></html>';

        const purchaserCount = (SPA_DATA && !SPA_DATA.isCompany && SPA_DATA.purchasers)
            ? SPA_DATA.purchasers.length : 1;


        const resp = await fetch('/render-pdf', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ html: html, spsl: spsl, purchaserCount: purchaserCount })
        });
        if (!resp.ok) {
            const msg = await resp.text().catch(function() { return ''; });
            throw new Error('Server render failed (' + resp.status + '): ' + msg);
        }
        const data = await resp.json();
        if (!data || !data.base64) throw new Error('Server returned no PDF data');

        btn.textContent = 'Attaching…';
        setStatus('Uploading to the deal…');
        const filename = 'Dubai_SPA_' + String(currentDealId) + '.pdf';
        const fields = {};
        fields[SPA_FILE_FIELD] = { fileData: [filename, data.base64] };
        await callBX('crm.deal.update', { id: currentDealId, fields: fields });

        setStatus('\u2713 Attached to the SPA field on the General tab.');
        btn.textContent = 'Attached \u2713';
        setTimeout(function() { btn.disabled = false; btn.textContent = 'Attach to Deal'; }, 2500);
    } catch (e) {
        console.error('[SPA] attach error:', e);
        setStatus('Attach failed (see console).', true);
        btn.disabled = false; btn.textContent = 'Attach to Deal';
    }
}
